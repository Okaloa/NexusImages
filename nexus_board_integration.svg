</style>
</defs>
<text style="font-size:12px;font-weight:500;fill:#3d3d3a" x="20" y="14" dominant-baseline="central">Integration work</text>
<rect x="20" y="24" width="640" height="132" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
